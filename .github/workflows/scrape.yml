name: Scrape Court Availability

on:
  schedule:
    - cron: '*/15 * * * *'   # Runs Every 15 mins
  workflow_dispatch:           # manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run scraper
        run: python scrape_availability.py

      - name: Commit and push availability.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add availability.json
          git diff --cached --quiet || git commit -m "chore: update availability $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
